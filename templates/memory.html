<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../static/pipoca.png" type="image/png">
    <title>CineFlow - CineMemory Extreme</title>
    <link rel="stylesheet" href="../static/style.css">
    <style>
        /* --- ESTILIZAÇÃO --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .btn-mode {
            flex: 1;
            padding: 18px;
            border-radius: var(--radius);
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid var(--accent);
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 140px;
        }
        
        body:not(.light-theme) .btn-mode { background: #000; }
        body.light-theme .btn-mode { background: #fff; }
        .btn-mode:hover { background: var(--accent) !important; color: #fff !important; }

        .score-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--primary);
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .score-toggle:hover { border-color: var(--accent); }

        .hidden-score { opacity: 0; filter: blur(15px); pointer-events: none; }

        @keyframes shuffle-blink {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.95); opacity: 0.4; filter: brightness(1.8); }
            100% { transform: scale(1); opacity: 1; }
        }
        .shuffling { animation: shuffle-blink 0.5s ease-in-out; }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .memory-card { aspect-ratio: 1/1; perspective: 1000px; cursor: pointer; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: var(--radius);
        }
        .flipped .card-inner { transform: rotateY(180deg); box-shadow: 0 0 15px var(--accent); }
        
        .card-front { 
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center;
            background: #0d1117; color: var(--accent); font-size: 2.5rem; font-weight: 900; border: 2px solid var(--accent); 
        }

        .card-back { 
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: var(--radius);
            border: 2px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            transform: rotateY(180deg); background: #000; overflow: hidden; 
        }

        .card-back img { width: 100%; height: 100%; object-fit: contain; background: #000; }

        .ranking-scroll { max-height: 250px; overflow-y: auto; margin-top: 15px; }
        .ranking-scroll::-webkit-scrollbar { width: 4px; }
        .ranking-scroll::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        @media (max-width: 600px) { .memory-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body class="dark-theme">

    <header class="container">
        <div class="header-top">
            <a href="/" style="text-decoration: none; color: inherit;">
                <h1>CineFlow <span style="color:var(--accent)">MEMORY</span></h1>
            </a>
            <div class="header-controls" style="display: flex; gap: 10px;">
                <button onclick="toggleScoreVisibility()" class="score-toggle" id="score-btn">
                    <span id="score-icon">👁️</span> Pontos
                </button>
                <button id="themeButton" class="theme-toggle">☀️ Modo Claro</button>
            </div>
            <div id="stats-badge" class="timer-badge">MENU</div>
        </div>
    </header>

    <main class="container">
        <section id="menu-screen">
            <div class="sinopse-container" style="text-align: center;">
                <h2 style="font-weight: 900; margin-bottom: 10px;">CineMemory Extreme</h2>
                <div style="background: rgba(47, 129, 247, 0.05); border-left: 4px solid var(--accent); padding: 15px; text-align: left; margin: 20px 0; font-size: 0.9rem;">
                    <strong style="color: var(--accent); display: block; margin-bottom: 5px;">COMO JOGAR:</strong>
                    Encontre todos os pares de filmes antes que o tempo se esgote. Use sua memória para dominar os rankings globais.
                </div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                    <button onclick="showManual('time')" class="btn-mode">⏱️ Normal</button>
                    <button onclick="showManual('hard')" class="btn-mode">🔥 Hard</button>
                    <button onclick="showManual('nightmare')" class="btn-mode" style="width: 100%; border-color: #ff4b4b; color: #ff4b4b;">💀 Modo Pesadelo</button>
                </div>
            </div>

            <div class="sinopse-container" style="margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin: 0; font-weight: 900;">🏆 RANKING GERAL</h3>
                    <button id="btn-reset-link" onclick="abrirModalReset()" style="background: none; border: none; color: #ff4b4b; cursor: pointer; font-size: 0.7rem; font-weight: bold; display: none;">LIMPAR DADOS</button>
                </div>
                <div class="ranking-scroll">
                    <table style="width: 100%; border-collapse: collapse;">
                        <tbody id="ranking-body"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="game-screen" style="display: none;">
            <div id="score-display" style="text-align: center; font-weight: 900; color: var(--accent); font-size: 2.2rem; margin-bottom: 15px; transition: all 0.3s ease;">PONTOS: 0</div>
            <div id="memory-grid" class="memory-grid"></div>
        </section>
    </main>

    <div id="modal-manual" class="modal-overlay">
        <div class="modal-content sinopse-container" style="max-width: 450px; width: 90%;">
            <h2 id="manual-title" style="color: var(--accent); font-weight: 900; text-align: center;">MANUAL</h2>
            <div id="manual-body" style="margin: 20px 0; line-height: 1.6; font-size: 1rem;"></div>
            <button id="btn-confirm-start" class="btn-favorito" style="width: 100%; margin: 0;">ESTOU PRONTO!</button>
        </div>
    </div>

    <div id="modal-fim" class="modal-overlay">
        <div class="modal-content sinopse-container" style="max-width: 400px; width: 90%; text-align: center;">
            <h2 id="finish-title" style="font-weight: 900; color: var(--accent);">VITÓRIA!</h2>
            <p id="finish-score-text" style="font-size: 1.3rem; margin: 15px 0;">Sua pontuação: <strong>0</strong></p>
            <input type="text" id="player-name" maxlength="15" placeholder="Seu Nome de Agente" 
                   style="width: 100%; padding: 15px; border-radius: var(--radius); border: 1px solid var(--border-color); background: var(--bg-body); color: var(--primary); margin-bottom: 20px; text-align: center; font-weight: bold;">
            <button onclick="salvarRanking()" class="btn-favorito" style="width: 100%; margin: 0;">REGISTRAR RECORDE</button>
        </div>
    </div>

    <div id="modal-reset-ranking" class="modal-overlay">
        <div class="modal-content sinopse-container" style="max-width: 350px; width: 90%; text-align: center; border-color: #ff4b4b;">
            <h2 style="color: #ff4b4b; font-weight: 900;">ZERAR TUDO?</h2>
            <p style="margin: 15px 0;">Isso apagará permanentemente todos os recordes.</p>
            <div style="display: flex; gap: 10px;">
                <button onclick="confirmarResetRanking()" class="btn-favorito" style="flex: 1; background: #ff4b4b; margin: 0;">SIM</button>
                <button onclick="fecharModalReset()" class="btn-favorito" style="flex: 1; background: var(--border-color); color: #fff; margin: 0;">NÃO</button>
            </div>
        </div>
    </div>

    <script>
        // --- LÓGICA DO TEMA RESTAURADA ---
        const themeButton = document.getElementById('themeButton');
        const applyTheme = (t) => {
            if (t === 'light') { 
                document.body.classList.add('light-theme'); 
                themeButton.innerText = "🌙 Modo Escuro"; 
            } else { 
                document.body.classList.remove('light-theme'); 
                themeButton.innerText = "☀️ Modo Claro"; 
            }
        };
        applyTheme(localStorage.getItem('theme') || 'dark');
        themeButton.onclick = () => {
            const newT = document.body.classList.contains('light-theme') ? 'dark' : 'light';
            applyTheme(newT);
            localStorage.setItem('theme', newT);
        };

        let scoreVisible = true;
        let flippedCards = [];
        let matchedPairs = 0;
        let score = 0;
        let timeLeft = 60;
        let timerInterval, nightmareInterval, canFlip = false;
        let currentMode = '';

        function toggleScoreVisibility() {
            scoreVisible = !scoreVisible;
            const scoreDisplay = document.getElementById('score-display');
            const icon = document.getElementById('score-icon');
            scoreDisplay.classList.toggle('hidden-score', !scoreVisible);
            icon.innerText = scoreVisible ? "👁️" : "🙈";
        }

        function showManual(mode) {
            currentMode = mode;
            const modal = document.getElementById('manual-title');
            const body = document.getElementById('manual-body');
            document.getElementById('modal-manual').style.display = 'flex';
            
            if(mode === 'time') {
                modal.innerText = "⏱️ MODO NORMAL";
                body.innerHTML = `<strong>Atenção:</strong> Você terá 9 segundos para ver as cartas.<br><br><strong>Pontuação:</strong> Ganhe (Tempo Restante × 10) por cada par encontrado.`;
            } else if(mode === 'hard') {
                modal.innerText = "🔥 MODO HARD";
                body.innerHTML = `<strong>Atenção:</strong> Sem preview! Memorize as cartas enquanto joga.<br><br><strong>Pontuação:</strong> 200 pontos fixos por par encontrado.`;
            } else {
                modal.innerText = "💀 MODO PESADELO";
                body.innerHTML = `<strong>Atenção:</strong> Sem preview e as cartas mudam de lugar rigorosamente a cada 5 segundos!<br><br><strong>Pontuação:</strong> 500 pontos por par.`;
            }
            document.getElementById('btn-confirm-start').onclick = () => {
                document.getElementById('modal-manual').style.display = 'none';
                startGame(mode);
            };
        }

        async function startGame(mode) {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            const res = await fetch('/api/game/memoria');
            const cards = await res.json();
            setupBoard(cards);
            if (mode === 'hard' || mode === 'nightmare') {
                document.getElementById('stats-badge').innerText = mode === 'hard' ? "🔥 HARD" : "💀 NIGHT";
                canFlip = true;
                startTimer();
                if(mode === 'nightmare') startNightmareEffect();
            } else {
                startPreviewPhase();
            }
        }

        function setupBoard(cards) {
            const grid = document.getElementById('memory-grid');
            grid.innerHTML = '';
            matchedPairs = 0; score = 0; timeLeft = 60;
            updateScoreDisplay();
            cards.forEach(cardData => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.id = cardData.id;
                card.innerHTML = `<div class="card-inner">
                    <div class="card-front">?</div>
                    <div class="card-back">
                        ${cardData.tipo === 'imagem' 
                            ? `<img src="${cardData.conteudo}">` 
                            : `<span style="color:white; font-size:0.9rem; text-align:center; font-weight:900; padding:10px; text-transform:uppercase;">${cardData.conteudo}</span>`
                        }
                    </div>
                </div>`;
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }

        function startPreviewPhase() {
            const badge = document.getElementById('stats-badge');
            const cards = document.querySelectorAll('.memory-card');
            let pTimer = 9;
            cards.forEach(c => c.classList.add('flipped'));
            badge.innerText = `👀 ${pTimer}S`;
            const pInt = setInterval(() => {
                pTimer--;
                badge.innerText = `👀 ${pTimer}S`;
                if (pTimer <= 0) { 
                    clearInterval(pInt); 
                    cards.forEach(c => c.classList.remove('flipped')); 
                    canFlip = true; 
                    startTimer(); 
                }
            }, 1000);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('stats-badge').innerText = `⏳ ${timeLeft}S`;
                if(timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function startNightmareEffect() {
            nightmareInterval = setInterval(() => {
                if (flippedCards.length === 1) return;
                const grid = document.getElementById('memory-grid');
                const allCards = Array.from(grid.children);
                canFlip = false;
                allCards.forEach(c => { if (!c.classList.contains('matched')) c.classList.remove('flipped'); });
                flippedCards = [];
                allCards.forEach(c => c.classList.add('shuffling'));
                setTimeout(() => {
                    const shuffled = allCards.sort(() => Math.random() - 0.5);
                    grid.innerHTML = '';
                    shuffled.forEach(c => { grid.appendChild(c); c.classList.remove('shuffling'); });
                    canFlip = true;
                }, 500);
            }, 5000);
        }

        function flipCard(card) {
            if(!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            card.classList.add('flipped');
            flippedCards.push(card);
            if(flippedCards.length === 2) {
                canFlip = false;
                const [c1, c2] = flippedCards;
                if(c1.dataset.id === c2.dataset.id) {
                    c1.classList.add('matched'); c2.classList.add('matched');
                    matchedPairs++;
                    if (currentMode === 'time') score += (timeLeft * 10);
                    else if (currentMode === 'hard') score += 200;
                    else score += 500;
                    updateScoreDisplay();
                    flippedCards = []; canFlip = true;
                    if(matchedPairs >= 12) endGame(true);
                } else {
                    setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; canFlip = true; }, 1000);
                }
            }
        }

        function updateScoreDisplay() { document.getElementById('score-display').innerText = `PONTOS: ${score}`; }

        function endGame(win) {
            clearInterval(timerInterval); clearInterval(nightmareInterval);
            document.getElementById('modal-fim').style.display = 'flex';
            document.getElementById('finish-title').innerText = win ? "🏆 VITÓRIA!" : "⏰ FIM DE JOGO";
            document.getElementById('finish-score-text').innerHTML = `Sua pontuação: <strong>${score}</strong>`;
        }

        function salvarRanking() {
            const name = document.getElementById('player-name').value.trim() || "Anônimo";
            const ranking = JSON.parse(localStorage.getItem('memory_ranking') || '[]');
            ranking.push({ name, points: score });
            ranking.sort((a, b) => b.points - a.points);
            localStorage.setItem('memory_ranking', JSON.stringify(ranking.slice(0, 10)));
            location.reload();
        }

        function loadRanking() {
            const ranking = JSON.parse(localStorage.getItem('memory_ranking') || '[]');
            const table = document.getElementById('ranking-body');
            if (ranking.length > 0) {
                document.getElementById('btn-reset-link').style.display = 'block';
                table.innerHTML = ranking.map((r, i) => `<tr><td style="padding:10px;">#${i+1}</td><td>${r.name}</td><td style="text-align:right;">${r.points}</td></tr>`).join('');
            } else {
                table.innerHTML = `<tr><td style="text-align:center; padding:20px;">Nenhum recorde ainda.</td></tr>`;
            }
        }

        function abrirModalReset() { document.getElementById('modal-reset-ranking').style.display = 'flex'; }
        function fecharModalReset() { document.getElementById('modal-reset-ranking').style.display = 'none'; }
        function confirmarResetRanking() { localStorage.removeItem('memory_ranking'); location.reload(); }

        window.onload = loadRanking;
    </script>
</body>
</html>
